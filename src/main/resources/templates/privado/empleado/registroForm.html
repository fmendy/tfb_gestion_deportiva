<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="es"
	layout:decorate="~{layout/base}">
<head>

<link rel="stylesheet"
	href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
	document.addEventListener('DOMContentLoaded',
			actualizarVisibilidadRegistroEmpleado);
</script>


</head>
<body>
	<div layout:fragment="content" class="container-fluid py-5 px-3">

		<div
			th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

		<div class="card shadow-lg border-0 rounded-4 p-4">

			<!-- Título -->
			<h3 class="text-center mb-4 fw-bold">
				<i class="bi bi-person-square me-2 text-gradient-primary"></i> <span
					th:text="#{page.title.privado.empleado}"> </span>
			</h3>

			<div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 bg-white">
				<form th:action="@{/privado/empleado/registro/guardar}"
					th:object="${form}" th:csrf="true" method="post" class="row g-4">

					<input type="hidden" th:field="*{id}" />



					<div class="col-md-4">
						<label for="nombre" class="form-label fw-semibold"> <i
							class="bi bi-journal-text me-1"></i> <span
							th:text="#{empleado.registro.form.nombre}">nombre</span> <span
							class="text-danger">*</span>
						</label> <input type="text" th:field="*{nombre}" id="nombre" required
							class="form-control rounded-3"
							th:placeholder="#{empleado.registro.form.nombre}" maxlength="255">
						<div class="text-danger mt-1"
							th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">
							<i class="bi bi-exclamation-circle me-1"></i> Error
						</div>
					</div>

					<div class="col-md-4">
						<label for="email" class="form-label fw-semibold"> <i
							class="bi bi-mailbox me-1"></i> <span
							th:text="#{empleado.registro.form.email}">Email </span> <span
							class="text-danger">*</span>
						</label> <input type="email" th:field="*{email}" id="email" required
							class="form-control rounded-3"
							th:placeholder="#{empleado.registro.form.email}" maxlength="255">
						<div class="text-danger mt-1"
							th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
							<i class="bi bi-exclamation-circle me-1"></i> Error
						</div>
					</div>

					<div class="col-md-4">
						<label for="emailConfirmar" class="form-label fw-semibold">
							<i class="bi bi-mailbox2 me-1"></i> <span
							th:text="#{empleado.registro.form.email.confirmar}">Email
						</span> <span class="text-danger">*</span>
						</label> <input type="email" th:field="*{emailConfirmar}"
							id="emailConfirmar" required class="form-control rounded-3"
							th:placeholder="#{empleado.registro.form.email.confirmar}"
							maxlength="255">
						<div class="text-danger mt-1"
							th:if="${#fields.hasErrors('emailConfirmar')}"
							th:errors="*{emailConfirmar}">
							<i class="bi bi-exclamation-circle me-1"></i> Error
						</div>
					</div>

					<!-- Password -->
					<div class="col-md-4">
						<label for="password" class="form-label fw-semibold"> <i
							class="bi bi-key me-1"></i> <span
							th:text="#{empleado.registro.form.password}">Password</span> <span
							class="text-danger">*</span>
						</label>
						<div
							th:replace="~{fragments/componentes :: info-tooltip('empleado.registro.form.password.info')}"></div>
						<input type="password" th:field="*{password}" id="password"
							required class="form-control rounded-3 "
							th:placeholder="#{empleado.registro.form.password}"
							maxlength="255">
						<div class="text-danger mt-1"
							th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
							<i class="bi bi-exclamation-circle me-1"></i> Error
						</div>
					</div>

					<!-- Password Confirmar -->
					<div class="col-md-4">
						<label for="passwordConfirmar" class="form-label fw-semibold">
							<i class="bi bi-key-fill me-1"></i> <span
							th:text="#{empleado.registro.form.password.confirmar}">PasswordConfirmar</span>
							<span class="text-danger">*</span>
						</label> <input type="password" th:field="*{passwordConfirmar}"
							id="passwordConfirmar" required class="form-control rounded-3 "
							th:placeholder="#{empleado.registro.form.password.confirmar}"
							maxlength="255">
						<div class="text-danger mt-1"
							th:if="${#fields.hasErrors('passwordConfirmar')}"
							th:errors="*{passwordConfirmar}">
							<i class="bi bi-exclamation-circle me-1"></i> Error
						</div>
					</div>

					<div class="col-md-4">
						<label for="rolId" class="form-label fw-bold"
							th:text="#{empleado.registro.form.rol}"></label> <span
							class="text-danger">*</span>
						<div class="input-group">
							<span class="input-group-text"><i
								class="bi bi-card-heading"></i></span> <select class="form-select"
								id="selectRol"
								onchange="actualizarVisibilidadRegistroEmpleado()"
								required="required" th:field="*{rolId}">
								<option th:each="rol : ${listRoles}" th:value="${rol.id}"
									th:text="${rol.nombre}"></option>
							</select>
						</div>
					</div>


					<div id="containerEmpresa" class="col-md-4">
						<label for="empresaId" class="form-label fw-bold"
							th:text="#{empleado.registro.form.empresa}"></label> <span
							class="text-danger">*</span>
						<div class="input-group">
							<span class="input-group-text"><i
								class="bi bi-card-heading"></i></span> <select class="form-select"
								id="selectEmpresa" th:field="*{empresaId}">
								<option th:each="empresa : ${listEmpresas}"
									th:value="${empresa.id}" th:text="${empresa.nombre}"></option>
							</select>
						</div>
					</div>

					<div id="containerSede" class="col-md-4">
						<label for="sedeId" class="form-label fw-bold"
							th:text="#{empleado.registro.form.sede}"></label> <span
							class="text-danger">*</span>
						<div class="input-group">
							<span class="input-group-text"><i
								class="bi bi-card-heading"></i></span> <select class="form-select"
								id="selectSede" th:field="*{sedeId}">
								<option th:each="sede : ${listSedes}" th:value="${sede.id}"
									th:text="${sede.empresaSedeNombre}"></option>
							</select>
						</div>
					</div>

					<div id="containerInstalacion" class="col-md-4">
						<label for="instalacionId" class="form-label fw-bold"
							th:text="#{empleado.registro.form.instalacion}"></label> <span
							class="text-danger">*</span>
						<div class="input-group">
							<span class="input-group-text"><i
								class="bi bi-card-heading"></i></span> <select class="form-select"
								id="selectInstalacion" th:field="*{instalacionId}">
								<option th:each="sede : ${listInstalaciones}"
									th:value="${sede.id}"
									th:text="${sede.empresaSedeInstalacionNombre}"></option>
							</select>
						</div>
					</div>






					<div
						class="col-12 d-grid d-md-flex justify-content-md-end gap-3 mt-4">
						<a th:href="@{/privado/empleado}"
							class="btn btn-outline-secondary rounded-3 px-4 py-2 d-inline-flex align-items-center justify-content-center fw-semibold">
							<i class="bi bi-x-lg me-2"></i> <span th:text="#{boton.cancelar}">Cancelar</span>
						</a>

						<button type="submit"
							class="btn btn-moderno-guardar px-5 py-2 fw-semibold">
							<i class="bi bi-check-circle-fill me-2"></i> <span
								th:text="#{boton.guardar}">Guardar</span>
						</button>
					</div>

				</form>
			</div>






		</div>
	</div>
</body>
</html>
