<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="es"
	layout:decorate="~{layout/base}">
<head>

<script>
	
</script>

</head>
<body>
	<div layout:fragment="content" class="container py-5">

		<div
			th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

		<div class="card shadow-lg border-0 rounded-4 p-4">
			<!-- Contenedor para título + acción -->
			<div
				class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
				<!-- Título -->
				<h5 class="mb-0 fw-semibold d-flex align-items-center">
					<i class="bi bi-buildings text-primary me-2 fs-4"></i> <span
						th:text="#{page.title.privado.instalacion}"></span>
				</h5>

				<a sec:authorize="hasAuthority('GESTION_EMPRESA')"
					th:href="@{/privado/instalacion/crear}"
					class="btn btn-primary rounded-3 px-4 py-2 d-flex align-items-center fw-semibold">
					<i class="bi bi-plus-lg me-2"></i> <span th:text="#{boton.crear}">Crear</span>
				</a>

			</div>

			<!-- Filtro de búsqueda -->
			<div class="card bg-light border-0 shadow-sm mb-4">
				<div class="card-body">
					<form th:action="@{/privado/instalacion}" method="get"
						th:object="${filter}" class="row g-3 align-items-center">




						<div class="col-md-4">
							<label for="empresaId" class="form-label fw-bold"
								th:text="#{instalacion.filter.empresa}"></label> <select
								id="selectEmpresa" class="form-select" th:field="*{empresaId}"
								onchange="cargarDatos(this.value, '/api/sede/list/instalacion', 'selectSede');">
								<option value="">Seleccione...</option>
								<option th:each="c : ${listEmpresas}" th:value="${c.id}"
									th:text="${c.nombre}"></option>
							</select>
						</div>

						<div class="col-md-4">
							<label class="form-label fw-bold">Sede</label> <select
								id="selectSede" class="form-select" th:field="*{sedeId}">
								<option value="">Seleccione...</option>
								<option th:each="p : ${listSedes}" th:value="${p.id}"
									th:text="${p.nombre}"></option>
							</select>
						</div>


						<div class="col-md-4">
							<label for="instalacionTipoId" class="form-label fw-bold"
								th:text="#{instalacion.filter.tipo.instalacion}"></label>
							<div class="input-group">
								<span class="input-group-text"><i
									class="bi bi-card-heading"></i></span> <select class="form-select"
									th:field="*{instalacionTipoId}">
									<option th:each="instalacion : ${listInstalacionTipo}"
										th:value="${instalacion.id}" th:text="${instalacion.nombre}"></option>
								</select>
							</div>
						</div>

						<div class="col-md-4">
							<label for="isbn" class="form-label fw-bold"
								th:text="#{instalacion.filter.nombre}"></label>
							<div class="input-group">
								<span class="input-group-text"><i
									class="bi bi-journal-text"></i></span> <input type="text"
									class="form-control" th:field="*{nombre}"
									th:placeholder="#{instalacion.filter.nombre}" />
							</div>
						</div>


						<div class="col-md-4 d-flex">
							<button type="submit" class="btn btn-primary me-2">
								<i class="bi bi-search"></i> <span th:text="#{boton.buscar}"></span>
							</button>
							<a th:href="@{/privado/instalacion}"
								class="btn btn-outline-secondary me-2"> <i
								class="bi bi-x-circle"></i> <span th:text="#{boton.limpiar}"></span>
							</a>
						</div>


					</form>
				</div>
			</div>




			<div class="table-responsive">
				<table
					class="table table-hover align-middle shadow-sm rounded-3 overflow-hidden">
					<thead class="table-primary">
						<tr>
							<th class="text-nowrap"><span
								th:text="#{instalacion.tabla.empresa}"></span> <a
								class="ms-1 text-decoration-none text-muted opacity-75"
								th:href="${url}+'&sort=empresa.sede.nombre,ASC'"
								th:title="#{tabla.orden.ascendente}"> <i
									class="bi bi-arrow-down-short"></i>
							</a> <a class="text-decoration-none text-muted opacity-75"
								th:href="${url}+'&sort=empresa.sede.nombre,DESC'"
								th:title="#{tabla.orden.descendente}"> <i
									class="bi bi-arrow-up-short"></i>
							</a></th>

							<th class="text-nowrap"><span
								th:text="#{instalacion.tabla.sede}"></span> <a
								class="ms-1 text-decoration-none text-muted opacity-75"
								th:href="${url}+'&sort=sede.nombre,ASC'"
								th:title="#{tabla.orden.ascendente}"> <i
									class="bi bi-arrow-down-short"></i>
							</a> <a class="text-decoration-none text-muted opacity-75"
								th:href="${url}+'&sort=sede.nombre,DESC'"
								th:title="#{tabla.orden.descendente}"> <i
									class="bi bi-arrow-up-short"></i>
							</a></th>

							<th class="text-nowrap"><span
								th:text="#{instalacion.tabla.tipo.instalacion}"></span> <a
								class="ms-1 text-decoration-none text-muted opacity-75"
								th:href="${url}+'&sort=tipoInstalacion.nombre,ASC'"
								th:title="#{tabla.orden.ascendente}"> <i
									class="bi bi-arrow-down-short"></i>
							</a> <a class="text-decoration-none text-muted opacity-75"
								th:href="${url}+'&sort=tipoInstalacion.nombre,DESC'"
								th:title="#{tabla.orden.descendente}"> <i
									class="bi bi-arrow-up-short"></i>
							</a></th>

							<th class="text-nowrap"><span
								th:text="#{instalacion.tabla.nombre}"></span> <a
								class="ms-1 text-decoration-none text-muted opacity-75"
								th:href="${url}+'&sort=nombre,ASC'"
								th:title="#{tabla.orden.ascendente}"> <i
									class="bi bi-arrow-down-short"></i>
							</a> <a class="text-decoration-none text-muted opacity-75"
								th:href="${url}+'&sort=nombre,DESC'"
								th:title="#{tabla.orden.descendente}"> <i
									class="bi bi-arrow-up-short"></i>
							</a></th>

							<th class="text-center" style="width: 60px;"><i
								class="bi bi-pencil"></i></th>
							<th class="text-center" style="width: 60px;"><i
								class="bi bi-trash"></i></th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="element : ${page.content}">
							<td class="fw-semibold" th:text="${element.empresaNombre}"></td>
							<td class="fw-semibold" th:text="${element.sedeNombre}"></td>
							<td class="fw-semibold"
								th:text="${element.tipoInstalacionNombre}"></td>
							<td th:text="${element.nombre}"></td>

							<td class="text-center"><a
								th:href="@{/privado/instalacion/{id}/editar(id=${element.id})}"
								class="btn btn-sm btn-outline-primary rounded-circle d-inline-flex align-items-center justify-content-center"
								style="width: 32px; height: 32px;" th:title="#{boton.editar}">
									<i class="bi bi-pencil-square"></i>
							</a></td>

							<td class="text-center">
								<button type="button"
									class="btn btn-sm btn-outline-danger rounded-circle d-inline-flex align-items-center justify-content-center hover-scale"
									style="width: 32px; height: 32px;" data-bs-toggle="modal"
									th:attr="data-bs-target='#confirmarEliminarModal-' + ${element.id}"
									th:title="#{instalacion.modal.boton.eliminar}">
									<i class="bi bi-trash"></i>
								</button>

								<div
									th:replace="~{fragments/modals :: modalConfirmacion(
                        'confirmarEliminarModal-' + ${element.id},
                        #{instalacion.modal.titulo.eliminar},
                        #{instalacion.modal.body.eliminar},
                        @{/privado/instalacion/{id}/eliminar(id=${element.id})},
                        #{instalacion.modal.boton.eliminar}
                      )}">
								</div>
							</td>
						</tr>

						<tr th:if="${#lists.isEmpty(page.content)}">
							<td colspan="4" class="text-center text-muted py-5"><i
								class="bi bi-search fs-2 d-block mb-2 text-secondary"></i> <span
								th:text="#{tabla.no.se.encontraron.resultados}"></span></td>
						</tr>
					</tbody>
				</table>
			</div>

			<div
				th:replace="~{fragments/pagination :: pagination(${page}, ${url}, ${sort})}"></div>



		</div>
	</div>
</body>
</html>
