<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="es"
	layout:decorate="~{layout/base}">
<body>
	<div layout:fragment="content" class="container-fluid py-5 px-3">

		<div
			th:replace="~{fragments/breadcrumbs :: breadcrumbs(${breadcrumbs})}"></div>

		<div class="card shadow-lg border-0 rounded-4 p-4">
			<h3 class="text-center mb-4 fw-bold">
				<i class="bi bi-gear me-2 text-primary"></i> <span
					th:text="#{page.title.privado.instalacion.configuracion.reserva}">Horarios</span>
			</h3>

			<div
				th:replace="~{fragments/instalacion-tabs :: tabs(${form.instalacionId}, 'configuracion-reserva')}"></div>

			<div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 bg-white">
				<form
					th:action="@{/privado/instalacion/{id}/configuracion/reserva/guardar(id=${form.instalacionId})}"
					th:object="${form}" method="post" class="row g-4">

					<input type="hidden" th:field="*{instalacionId}" />
					<input type="hidden" th:field="*{id}" />

					<div class="col-md-4">
						<label for="duracionMin"
							class="form-label fw-semibold text-secondary"> <i
							class="bi bi-hourglass-split me-1 text-primary"></i> <span
							th:text="#{instalacion.configuracion.reserva.form.duracion.minima}">Duración
								Mín.</span> <span class="text-danger">*</span>
						</label> <input type="number" th:field="*{duracionMin}" id="duracionMin"
							required class="form-control rounded-3 py-2" min="0" max="540"
							step="1">
						<div class="text-danger small mt-1"
							th:if="${#fields.hasErrors('duracionMin')}"
							th:errors="*{duracionMin}"></div>
					</div>

					<div class="col-md-4">
						<label for="duracionMax"
							class="form-label fw-semibold text-secondary"> <i
							class="bi bi-hourglass-split me-1 text-primary"></i> <span
							th:text="#{instalacion.configuracion.reserva.form.duracion.maxima}">Duración
								Máx.</span> <span class="text-danger">*</span>
						</label> <input type="number" th:field="*{duracionMax}" id="duracionMax"
							required class="form-control rounded-3 py-2" min="0" max="540"
							step="1">
						<div class="text-danger small mt-1"
							th:if="${#fields.hasErrors('duracionMax')}"
							th:errors="*{duracionMax}"></div>
					</div>

					<div class="col-md-4">
						<label for="intervaloHorario"
							class="form-label fw-semibold text-secondary"> <i
							class="bi bi-arrows-collapse me-1 text-primary"></i> <span
							th:text="#{instalacion.configuracion.reserva.form.intervalo.horario}">Intervalo</span>
							<span class="text-danger">*</span>
						</label> <input type="number" th:field="*{intervaloHorario}"
							id="intervaloHorario" required
							class="form-control rounded-3 py-2" min="0" max="540" step="1">
						<div class="text-danger small mt-1"
							th:if="${#fields.hasErrors('intervaloHorario')}"
							th:errors="*{intervaloHorario}"></div>
					</div>

					<div class="col-12 text-end mt-4 pt-3 border-top">
						<button type="submit"
							class="btn btn-primary px-5 py-2 fw-semibold shadow-sm">
							<i class="bi bi-check-circle-fill me-2"></i> <span
								th:text="#{boton.guardar}">Guardar</span>
						</button>
					</div>
				</form>
			</div>
		</div>


	</div>
</body>
</html>
