<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/base}">
<body>
	<div layout:fragment="content" class="container py-5">
		<div class="row justify-content-center">
			<div class="col-lg-6">

				<form th:action="@{/privado/reserva/instalacion/{id}/confirmar(id=*{instalacionId})}"
					th:object="${form}" method="post" class="needs-validation">
					<input type="hidden" th:field="*{instalacionId}" /> <input
						type="hidden" th:field="*{fecha}" /> <input type="hidden"
						th:field="*{hora}" /> <input type="hidden" th:field="*{duracion}" />

					<div class="card border-0 shadow-lg rounded-4 overflow-hidden">
						<div class="card-header bg-primary text-white p-4 border-0">
							<h4 class="mb-0 fw-bold">
								<i class="bi bi-calendar-check me-2"></i><span
									th:text="#{reserva.instalacion.datos}"></span>
							</h4>
						</div>

						<div class="card-body p-4">
							<div class="row g-3">
								<div class="col-12">
									<div
										class="d-flex justify-content-between border-bottom pb-2 mb-3">
										<span class="text-muted fw-medium"
											th:text="#{reserva.instalacion.nombre}"></span> <span
											class="fw-bold text-dark" th:text="*{instalacionNombre}"></span>
									</div>
									<div
										class="d-flex justify-content-between border-bottom pb-2 mb-3">
										<span class="text-muted fw-medium"
											th:text="#{reserva.instalacion.tipo}"></span> <span
											class="fw-bold text-dark"
											th:text="*{instalacionInstalacionTipoNombre}"></span>
									</div>
									<div
										class="d-flex justify-content-between border-bottom pb-2 mb-3">
										<span class="text-muted fw-medium"
											th:text="#{reserva.instalacion.sede}"></span> <span
											class="fw-bold text-dark" th:text="*{instalacionSedeNombre}"></span>
									</div>
									<div
										class="d-flex justify-content-between border-bottom pb-2 mb-3">
										<span class="text-muted fw-medium"
											th:text="#{reserva.instalacion.empresa}"></span> <span
											class="fw-bold text-dark"
											th:text="*{instalacionSedeEmpresaNombre}"></span>
									</div>
								</div>

								<div class="col-12 mt-3">
									<div
										class="bg-light p-3 rounded-3 d-flex justify-content-around text-center">
										<div>
											<small class="text-muted d-block text-uppercase"
												th:text="#{reserva.instalacion.fecha}"></small> <span
												class="fw-bold fs-5"
												th:text="${#temporals.format(form.fecha, 'dd/MM/yyyy')}"></span>
										</div>
										<div>
											<small class="text-muted d-block text-uppercase"
												th:text="#{reserva.instalacion.horario}"></small> <span
												class="fw-bold fs-5" th:text="*{hora} + ' - ' + *{horaFin}"></span>
										</div>
									</div>
								</div>
							</div>
						</div>

						<div class="card-footer bg-white border-0 p-4 pt-0">
							<div class="d-grid gap-2">
								<button sec:authorize="hasAuthority('GESTION_RESERVA_PROPIA')"
									type="submit"
									class="btn btn-primary btn-lg rounded-pill shadow-sm">
									<i class="bi bi-check-circle me-2"></i><span
										th:text="#{boton.confirmar.reserva}">Confirmar</span>
								</button>

								<div sec:authorize="!hasAuthority('GESTION_RESERVA_PROPIA')"
									class="alert alert-warning mb-0 text-center">
									<i class="bi bi-exclamation-triangle"></i> No tiene permisos
									para confirmar reservas.
								</div>

								<a
									th:href="@{/publico/instalacion/{id}/disponibilidad?fecha={fecha}(id=*{instalacionId},fecha=*{fecha})}"
									class="btn btn-link text-decoration-none text-muted"> <span
									th:text="#{boton.cancelar}">Cancelar</span>
								</a>
							</div>
						</div>
					</div>
				</form>
			</div>
		</div>
	</div>
</body>
</html>
