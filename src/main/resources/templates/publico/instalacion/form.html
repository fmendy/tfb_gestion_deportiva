<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="es"
	layout:decorate="~{layout/base}">
<head>

<link rel="stylesheet"
	href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script
	src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>



<style>
/* Ajustes estéticos para FullCalendar */
.fc .fc-toolbar-title {
	font-size: 1.25rem !important;
	font-weight: 700;
}

.fc .fc-button-primary {
	background-color: #0d6efd;
	border-color: #0d6efd;
}

.fc .fc-button-primary:hover {
	background-color: #0b5ed7;
}

#calendar {
	height: 600px;
} /* Altura fija para que no se deforme */
</style>

</head>
<body>
	<div layout:fragment="content" class="container py-5">
		<div class="row g-4 mb-4">
			<div class="col-lg-4">
				<div class="card border-0 shadow-sm rounded-4 p-4 h-100">
					<div class="d-flex align-items-start mb-3">
						<div class="bg-primary bg-opacity-10 p-3 rounded-3 me-3">
							<i class="bi bi-buildings text-primary fs-3"></i>
						</div>
						<div>
							<h2 class="fw-bold mb-1" th:text="${instalacion.nombre}">Nombre
								Instalación</h2>
							<span class="badge bg-primary text-white"
								th:text="${instalacion.instalacionTipoNombre}">Tipo</span>
						</div>
					</div>
					<p class="text-muted" th:text="${instalacion.descripcion}">Descripción...</p>
				</div>
			</div>

			<div class="col-lg-6">
				<div class="card border-0 shadow-sm rounded-4 p-4 h-100">
					<h5 class="fw-bold mb-3">
						<i class="bi bi-geo-alt-fill text-primary me-2"></i><span
							th:text="#{instalacion.publico.ubicacion}"></span>
					</h5>


					<div class="bg-light p-3 rounded-3 mb-3">
						<p class="mb-2 fw-bold text-primary"
							th:text="${instalacion.sedeNombre}">Nombre Sede</p>

						<p class="mb-0 text-muted small">
							<span
								th:text="${instalacion.sedeMunicipioProvinciaComunidadAutonomaNombre}">Comunidad</span>,
							<span th:text="${instalacion.sedeMunicipioProvinciaNombre}">Provincia</span>,
							<span th:text="${instalacion.sedeMunicipioNombre}">Municipio</span>,
							<span th:text="${instalacion.sedeDireccion}">Dirección</span>
						</p>
					</div>

					<div id="map" class="rounded-3 shadow-sm"
						style="height: 200px; width: 100%;"></div>
				</div>
			</div>
		</div>

		<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        // 1. Inicializar Mapa
        const lat = /*[[${instalacion.sedeLatitud}]]*/ 40.4167;
        const lng = /*[[${instalacion.sedeLongitud}]]*/ -3.7037;
        
        const map = L.map('map').setView([lat, lng], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        
        L.marker([lat, lng]).addTo(map).bindPopup("Ubicación de la sede");

        // 2. Inicializar Calendario (tu código anterior)
        const calendarEl = document.getElementById('instalacionCalendar');
        // ... (resto de tu lógica de FullCalendar)
    });
</script>

		<div class="row">
			<div class="col-12">
				<div class="card border-0 shadow-sm rounded-4 p-4">
					<h4 class="fw-bold mb-4 text-dark">
						<i class="bi bi-calendar-event me-2 text-primary"></i><span
							th:text="#{instalacion.publico.horario.apertura}"></span>
					</h4>
					<div id="instalacionCalendar" class="bg-white"></div>
				</div>
			</div>
		</div>

		<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('instalacionCalendar');
        // Usamos un bloque th:utext para imprimir el JSON correctamente
        const eventosRaw = /*[[${instalacion.horarioCalculado}]]*/ {};
                
        const calendar = new FullCalendar.Calendar(calendarEl, {
            events: Object.entries(eventosRaw).flatMap(([fecha, valor]) => {
                const lista = Array.isArray(valor) ? valor : (valor ? [valor] : []);
                
                return lista.map(horario => ({
                    title: horario.cerrado ? 'Cerrado' : (horario.horaInicio.substring(0,5) + ' - ' + horario.horaFin.substring(0,5)),
                    start: fecha,
                    backgroundColor: horario.cerrado ? '#f8d7da' : '#d1e7dd',
                    borderColor: horario.cerrado ? '#dc3545' : '#0f5132',
                    textColor: horario.cerrado ? '#842029' : '#0f5132'
                }));
            }),
            dateClick: function(info) {
                const fechaClicada = info.dateStr;
                const detallesDelDia = eventosRaw[fechaClicada];

                if (detallesDelDia) {
                	const instalacionId = /*[[${instalacion.id}]]*/ null;
                	const url = `/publico/instalacion/${instalacionId}/disponibilidad?fecha=${fechaClicada}`;
                    window.location.href = url;
                } else {
                    alert("No hay horarios registrados para esta fecha.");
                }
            }
        });
        
        calendar.render();
       
    });
    

</script>


	</div>


</body>
</html>
