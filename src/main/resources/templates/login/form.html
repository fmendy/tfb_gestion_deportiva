<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="es"
	layout:decorate="~{layout/base}">
<head>
</head>
<body>
	<div layout:fragment="content"
		class="d-flex justify-content-center align-items-center vh-100">
		<div class="card shadow-lg p-4" style="width: 350px;">
			<h3 class="text-center mb-3" th:text="#{login.iniciar.sesion}"></h3>

			<form th:action="@{/login}" method="post">
				<div class="mb-3">
					<label for="username" class="form-label" th:text="#{login.email}"></label>
					<input type="email" id="email" name="email" class="form-control"
						required autofocus>
				</div>
				<button type="submit" class="btn btn-info w-100 mb-2"
					th:text="#{boton.iniciar.sesion}"></button>
				<span class="text-secondary fst-italic small"
					th:text="#{login.no.registrado.usuario}"> </span> <a
					th:href="@{/publico/registro/usuario}"> <span
					th:text="#{login.no.registrado.enlace.registro}">Aqui</span>
				</a> <br> <span class="text-secondary fst-italic small"
					th:text="#{login.no.registrado.empresa}"> </span> <a
					th:href="@{/publico/registro/empresa}"> <span
					th:text="#{login.no.registrado.enlace.registro}">Aqui</span>
				</a>
			</form>
		</div>
	</div>
</body>
</html>
