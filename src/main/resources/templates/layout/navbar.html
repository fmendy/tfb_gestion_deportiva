<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
	lang="es">
<head>
<!-- Estilos modernos adicionales -->
<style>
/* Contenedor fijo para que los iconos no desplacen el texto */
.nav-management-icon {
	width: 2rem;
	display: inline-flex;
	justify-content: center;
	align-items: center;
	font-size: 1.2rem;
	transition: color 0.2s ease-in-out;
}

/* Colores personalizados para los iconos en estado normal */
.icon-usuarios {
	color: #4e73df !important;
}

.icon-autores {
	color: #1cc88a !important;
}

.icon-sexo {
	color: #36b9cc !important;
}

.icon-idioma {
	color: #e74a3b !important;
}

.icon-gear {
	color: #f6c23e !important;
}

/* REGLA CRÍTICA: Al hacer hover, el icono debe volverse blanco */
.dropdown-item:hover .nav-management-icon {
	color: #fff !important;
}

/* Mejora visual del dropdown */
.dropdown-menu {
	border-radius: 0.5rem;
	padding: 0.5rem 0;
}

.dropdown-item {
	padding: 0.6rem 1rem;
	font-weight: 500;
}
</style>
</head>
<body>
	<nav th:fragment="navbar"
		class="navbar navbar-expand-lg navbar-dark shadow-sm"
		style="background: linear-gradient(90deg, #007bff, #00d4ff);">
		<div class="container-fluid">
			<!-- Logo / Nombre del proyecto -->
			<a class="navbar-brand fw-bold text-white d-flex align-items-center"
				th:href="@{/}"> <i class="bi bi-book me-2"></i> <span
				th:text="#{project.name}">Proyecto</span>
			</a>

			<!-- Botón toggle para móviles -->
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>

			<!-- Menú -->
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ms-auto">

					<!-- Inicio -->
					<li class="nav-item"><a
						class="nav-link text-white d-flex align-items-center"
						th:href="@{/}"> <i class="bi bi-house-door-fill me-1"></i> <span
							th:text="#{navbar.inicio}">Inicio</span>
					</a></li>

					<!-- Login / Registro -->
					<li class="nav-item" sec:authorize="isAnonymous()"><a
						class="nav-link text-white d-flex align-items-center"
						th:href="@{/login}"> <i class="bi bi-box-arrow-in-right me-1"></i>
							<span th:text="#{navbar.login}">Iniciar sesión</span>
					</a></li>
					
					<!-- Empresa -->
					<li class="nav-item" ><a
						class="nav-link text-white d-flex align-items-center"
						th:href="@{/publico/sede/mapa}"> <i
							class="bi bi-map me-1"></i> <span
							th:text="#{navbar.sede.mapa}">Sede sede</span>
					</a></li>
					
					
					<!-- Empresa -->
					<li class="nav-item" sec:authorize="hasAuthority('GESTION_USUARIO_INSTALACION')"><a
						class="nav-link text-white d-flex align-items-center"
						th:href="@{/privado/empleado}"> <i
							class="bi bi-person-square me-1"></i> <span
							th:text="#{navbar.gestion.empleados}">Gestionar empleados</span>
					</a></li>

					<!-- Empresa -->
					<li class="nav-item" sec:authorize="hasAuthority('GESTION_EMPRESA')"><a
						class="nav-link text-white d-flex align-items-center"
						th:href="@{/privado/empresa}"> <i
							class="bi bi-buildings me-1"></i> <span
							th:text="#{navbar.gestion.empresas}">Gestionar empresas</span>
					</a></li>
					
					<!-- Sede -->
					<li class="nav-item" sec:authorize="hasAuthority('GESTION_SEDE')"><a
						class="nav-link text-white d-flex align-items-center"
						th:href="@{/privado/sede}"> <i
							class="bi bi-geo me-1"></i> <span
							th:text="#{navbar.gestion.sedes}">Gestionar sedes</span>
					</a></li>
					
					<!-- Sede -->
					<li class="nav-item" sec:authorize="hasAuthority('GESTION_INSTALACION')"><a
						class="nav-link text-white d-flex align-items-center"
						th:href="@{/privado/instalacion}"> <i
							class="bi bi-trophy me-1"></i> <span
							th:text="#{navbar.gestion.instalaciones}">Gestionar instalacion</span>
					</a></li>





				</ul>

				<ul>
					<!-- Dropdown usuario -->
					<li class="nav-item dropdown" sec:authorize="isAuthenticated()">
						<a
						class="nav-link dropdown-toggle text-white d-flex align-items-center"
						href="#" id="userDropdown" role="button" data-bs-toggle="dropdown"
						aria-expanded="false"> <i class="bi bi-person-circle me-1"></i>
							<span th:text="${#authentication.name}">Usuario</span>
					</a>
						<ul class="dropdown-menu dropdown-menu-end shadow border-0"
							aria-labelledby="userDropdown">
							<li><a class="dropdown-item" th:href="@{/privado/miperfil}"
								th:text="#{navbar.mi.perfil}">Mi perfil</a></li>
							<li>
								<form th:action="@{/privado/logout}" method="post">
									<button type="submit" class="dropdown-item"
										th:text="#{navbar.cerrar.sesion}">Cerrar sesión</button>
								</form>
							</li>
						</ul>
					</li>

				</ul>
			</div>
		</div>
	</nav>

</body>
</html>
