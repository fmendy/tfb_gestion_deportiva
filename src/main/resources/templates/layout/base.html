<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Título dinámico -->
<title th:text="${pageTitle}"></title>

<!-- CSRF para Spring Security -->
<meta th:name="_csrf" th:content="${_csrf.token}" />
<meta th:name="_csrf_header" th:content="${_csrf.headerName}" />

<!-- Favicon -->
<link rel="icon" type="image/x-icon" th:href="@{/images/favicon.png}">

<!-- CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<link href="/css/custom.css" rel="stylesheet">
<link href="/css/font-awesome.min.css" rel="stylesheet" />
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet"
	href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
	integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
	crossorigin="" />
<script src="/js/funciones.js"></script>
<!-- Loader styles -->
<style>
#loader {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: white;
	z-index: 9999;
	display: flex;
	justify-content: center;
	align-items: center;
	transition: opacity 0.4s ease, visibility 0.4s ease;
}

#loader.hidden {
	opacity: 0;
	visibility: hidden;
	pointer-events: none;
}

.spinner-border {
	width: 4rem;
	height: 4rem;
	color: #007bff;
}
</style>
</head>
<body class="d-flex flex-column min-vh-100">

	<!-- Loader -->
	<div id="loader">
		<div class="spinner-border" role="status">
			<span class="visually-hidden">Cargando...</span>
		</div>
	</div>

	<!-- Navbar -->
	<div th:replace="~{layout/navbar :: navbar}"></div>

	<!-- Estado de operación -->
	<div th:replace="~{layout/stateOperation :: stateOperation}"></div>

	<!-- Contenido principal -->
	<main class="container my-4">
		<div layout:fragment="content">
			<p>Contenido por defecto</p>
		</div>
	</main>

	<!-- Footer -->
	<div th:replace="~{layout/footer :: footer}"></div>

	<!-- JS al final del body -->
	<script src="/js/jquery-3.7.1.min.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
		integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
		crossorigin=""></script>
	<script src="/js/funciones.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

	<!-- Loader script -->
	<script>
		window.addEventListener("load", function() {
			const loader = document.getElementById("loader");
			loader.classList.add("hidden");
		});
		

		
	</script>

	<script>
    // Inicializa todos los tooltips de la página
    document.addEventListener("DOMContentLoaded", function() {
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl)
        });
    });
</script>
</body>
</html>
