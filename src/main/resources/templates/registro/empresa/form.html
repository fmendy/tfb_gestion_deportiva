<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="es"
	layout:decorate="~{layout/base}">
<head>
</head>
<body>
	<div layout:fragment="content"
		class="d-flex justify-content-center align-items-center vh-100">
		<div class="card shadow-lg p-4 w-75">
			<h3 class="text-center mb-3" th:text="#{registro.empresa.title}"></h3>

			<form th:action="@{/publico/registro/empresa/guardar}" method="post"
				th:object="${form}" th:csrf="true">

				<!-- Nombre empresa -->
				<div class="col-12 mb-3">
					<label for="nombre" class="form-label fw-semibold"> <i
						class="bi bi-journal-text me-1"></i> <span
						th:text="#{registro.empresa.nombre}">Nombre Empresa</span> <span
						class="text-danger">*</span>
					</label> <input type="text" th:field="*{nombre}" id="nombre" required
						class="form-control rounded-3 "
						th:placeholder="#{registro.empresa.nombre}" maxlength="255">
					<div class="text-danger mt-1"
						th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">
						<i class="bi bi-exclamation-circle me-1"></i> Error
					</div>
				</div>
				
				<!-- CIF  -->
				<div class="col-12 mb-3">
					<label for="nombre" class="form-label fw-semibold"> <i
						class="bi bi-card-heading me-1"></i> <span
						th:text="#{registro.empresa.cif}">CIF</span> <span
						class="text-danger">*</span>
					</label> <input type="text" th:field="*{cif}" id="cif" required
						class="form-control rounded-3 "
						th:placeholder="#{registro.empresa.cif}" maxlength="20">
					<div class="text-danger mt-1"
						th:if="${#fields.hasErrors('cif')}" th:errors="*{cif}">
						<i class="bi bi-exclamation-circle me-1"></i> Error
					</div>
				</div>

				<!-- Email  -->
				<div class="col-12 mb-3">
					<label for="email" class="form-label fw-semibold"> <i
						class="bi bi-mailbox me-1"></i> <span
						th:text="#{registro.empresa.email}">Email </span> <span
						class="text-danger">*</span>
					</label> <input type="email" th:field="*{email}" id="email" required
						class="form-control rounded-3 "
						th:placeholder="#{registro.empresa.email}" maxlength="255">
					<div class="text-danger mt-1" th:if="${#fields.hasErrors('email')}"
						th:errors="*{email}">
						<i class="bi bi-exclamation-circle me-1"></i> Error
					</div>
				</div>

				<!-- Email confirmacion  -->
				<div class="col-12 mb-3">
					<label for="emailConfirmar" class="form-label fw-semibold">
						<i class="bi bi-mailbox2 me-1"></i> <span
						th:text="#{registro.empresa.email.confirmar}">Email </span> <span
						class="text-danger">*</span>
					</label> <input type="email" th:field="*{emailConfirmar}"
						id="emailConfirmar" required class="form-control rounded-3 "
						th:placeholder="#{registro.empresa.email}" maxlength="255">
					<div class="text-danger mt-1"
						th:if="${#fields.hasErrors('emailConfirmar')}"
						th:errors="*{emailConfirmar}">
						<i class="bi bi-exclamation-circle me-1"></i> Error
					</div>
				</div>

				<!-- Password -->
				<div class="col-12 mb-3">
					<label for="password" class="form-label fw-semibold"> <i
						class="bi bi-key me-1"></i> <span
						th:text="#{registro.empresa.password}">Password</span> <span
						class="text-danger">*</span>
					</label> <input type="password" th:field="*{password}" id="password"
						required class="form-control rounded-3 "
						th:placeholder="#{registro.empresa.password}" maxlength="255">
					<div class="text-danger mt-1"
						th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
						<i class="bi bi-exclamation-circle me-1"></i> Error
					</div>
				</div>

				<!-- Password Confirmar -->
				<div class="col-12 mb-3">
					<label for="passwordConfirmar" class="form-label fw-semibold">
						<i class="bi bi-key-fill me-1"></i> <span
						th:text="#{registro.empresa.password.confirmar}">PasswordConfirmar</span>
						<span class="text-danger">*</span>
					</label> <input type="password" th:field="*{passwordConfirmar}"
						id="passwordConfirmar" required class="form-control rounded-3 "
						th:placeholder="#{registro.empresa.password.confirmar}"
						maxlength="255">
					<div class="text-danger mt-1"
						th:if="${#fields.hasErrors('passwordConfirmar')}"
						th:errors="*{passwordConfirmar}">
						<i class="bi bi-exclamation-circle me-1"></i> Error
					</div>
				</div>


				<!-- URL -->
				<div class="col-12 mb-3">
					<label for="url" class="form-label fw-semibold"> <i
						class="bi bi-globe me-1"></i> <span
						th:text="#{registro.empresa.url}">Url</span>
					</label> <input type="text" th:field="*{url}" id="url"
						class="form-control rounded-3 "
						th:placeholder="#{registro.empresa.url}" maxlength="255">
					<div class="text-danger mt-1" th:if="${#fields.hasErrors('url')}"
						th:errors="*{url}">
						<i class="bi bi-exclamation-circle me-1"></i> Error
					</div>
				</div>

				<!-- Descripcion -->
				<div class="col-12 mb-3">
					<label for="descripcion" class="form-label fw-semibold"> <i
						class="bi bi-text-paragraph me-1"></i> <span
						th:text="#{registro.empresa.descripcion}">Descripción</span>
					</label>

					<textarea th:field="*{descripcion}" id="descripcion"
						class="form-control rounded-3"
						th:placeholder="#{registro.empresa.descripcion}" maxlength="1250"
						rows="4" style="resize: vertical;"></textarea>

					<div class="text-danger mt-1"
						th:if="${#fields.hasErrors('descripcion')}"
						th:errors="*{descripcion}">
						<i class="bi bi-exclamation-circle me-1"></i> Error
					</div>
				</div>

				<div class="col-12 mt-4 d-flex justify-content-end">
					<button type="submit" class="btn btn-primary btn-lg rounded-3">
						<i class="bi bi-check-circle me-2"></i> <span
							th:text="#{boton.registrarse}">Registrar Empresa</span>
					</button>
				</div>

			</form>
		</div>
	</div>
</body>
</html>
