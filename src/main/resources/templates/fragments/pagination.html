<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

	<div th:fragment="pagination(page, url, sort)">

		<div class="d-flex justify-content-between align-items-center mt-4">
			<small class="text-muted"> <span th:text="#{tabla.total}"></span>
				<span th:text="${page.totalElements}"></span> <span
				th:text="#{tabla.resultados}"></span>
			</small>

		</div>
		<nav th:if="${page.totalPages > 1}" aria-label="Pagination"
			class="mt-4">
			<ul class="pagination justify-content-center">

				<li class="page-item" th:classappend="${page.first} ? 'disabled'">
					<a class="page-link" th:href="@{${url}(page=0, sort=${sort})}"
					th:title="#{tabla.primera}"> <i
						class="bi bi-chevron-double-left"></i>
				</a>
				</li>

				<li class="page-item" th:classappend="${page.first} ? 'disabled'">
					<a class="page-link"
					th:href="@{${url}(page=${page.number - 1}, sort=${sort})}"
					th:title="#{tabla.anterior}"> <i class="bi bi-chevron-left"></i>
				</a>
				</li>

				<li class="page-item"
					th:each="i : ${#numbers.sequence(
                    (page.number - 2 < 0 ? 0 : (page.number + 2 >= page.totalPages ? (page.totalPages - 5 < 0 ? 0 : page.totalPages - 5) : page.number - 2)), 
                    (page.number + 2 >= page.totalPages ? page.totalPages - 1 : (page.number - 2 < 0 ? (4 >= page.totalPages ? page.totalPages - 1 : 4) : page.number + 2))
                )}"
					th:classappend="${i == page.number} ? 'active'"><a
					class="page-link" th:href="@{${url}(page=${i}, sort=${sort})}"
					th:text="${i + 1}">1</a></li>

				<li class="page-item" th:classappend="${page.last} ? 'disabled'">
					<a class="page-link"
					th:href="@{${url}(page=${page.number + 1}, sort=${sort})}"
					th:title="#{tabla.siguiente}"> <i class="bi bi-chevron-right"></i>
				</a>
				</li>

				<li class="page-item" th:classappend="${page.last} ? 'disabled'">
					<a class="page-link"
					th:href="@{${url}(page=${page.totalPages - 1}, sort=${sort})}"
					th:title="#{tabla.ultima}"> <i
						class="bi bi-chevron-double-right"></i>
				</a>
				</li>

			</ul>
		</nav>
	</div>

</body>
</html>
